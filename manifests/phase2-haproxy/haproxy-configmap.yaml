apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
  namespace: sock-shop
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 4096

    defaults
      log global
      mode http
      option httplog
      option dontlognull
      timeout connect 5s
      timeout client  50s
      timeout server  50s

    frontend http_in
      bind *:8080
      default_backend backend_app

    backend backend_app
      server local_app 127.0.0.1:8079 check

    frontend stats
      bind *:8404
      http-request use-service prometheus-exporter if { path /metrics }
      stats enable
      stats uri /stats
      stats refresh 10s
