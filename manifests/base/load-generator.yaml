apiVersion: batch/v1
kind: Job
metadata:
  name: load-generator
  namespace: sock-shop
spec:
  activeDeadlineSeconds: 300 # Run for exactly 5 minutes
  template:
    spec:
      containers:
      - name: hey
        image: williamyeh/hey
        command:
        - "hey"
        - "-z"
        - "5m"
        - "-c"
        - "10"
        - "http://front-end.sock-shop.svc.cluster.local/"
      restartPolicy: Never
